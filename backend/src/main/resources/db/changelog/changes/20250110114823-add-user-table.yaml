databaseChangeLog:
- changeSet:
    id: 1736509718215-1
    author: ReidyT
    changes:
    - createTable:
        columns:
        - column:
            constraints:
              nullable: false
              primaryKey: true
              primaryKeyName: UserPK
            name: id
            type: UUID
        - column:
            constraints:
              nullable: false
            name: email
            type: VARCHAR(30)
        - column:
            constraints:
              nullable: false
            name: password
            type: VARCHAR(60)
        - column:
            constraints:
              nullable: false
            name: username
            type: VARCHAR(15)
        tableName: bee_user
- changeSet:
    id: 1736509718215-2
    author: ReidyT
    changes:
    - addUniqueConstraint:
        columnNames: email
        constraintName: UC_BEE_USER_EMAIL
        tableName: bee_user
- changeSet:
    id: 1736509718215-3
    author: ReidyT
    changes:
    - addUniqueConstraint:
        columnNames: username
        constraintName: UC_BEE_USER_USERNAME
        tableName: bee_user
